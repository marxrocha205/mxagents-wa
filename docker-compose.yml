version: '3.8'

services:
  # ----------------------------------------
  # 1. Banco de Dados da Evolution API (NOVO)
  # ----------------------------------------
  evolution-postgres:
    image: postgres:15-alpine
    container_name: evolution_postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=evolution
    ports:
      - "5432:5432"
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data

  # ----------------------------------------
  # 2. Evolution API (Motor do WhatsApp)
  # ----------------------------------------
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - DOCKER_ENV=true
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=1234
      
      # [CORREÇÃO] Configuração Obrigatória do Banco de Dados
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgres@evolution-postgres:5432/evolution?schema=public
      
      # [OTIMIZAÇÃO] Cache local para não precisarmos subir um Redis agora
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
      
      # Webhooks globais apontando para nossa futura API Python
      - WEBHOOK_GLOBAL_URL=http://host.docker.internal:8000/api/v1/webhooks/evolution
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_EVENTS=APPLICATION_STARTUP,QRCODE_UPDATED,MESSAGES_UPSERT,MESSAGES_UPDATE,MESSAGES_DELETE,SEND_MESSAGE,CONNECTION_UPDATE
    volumes:
      - evolution_instances:/evolution/instances
    # Garante que a API só inicie DEPOIS que o banco estiver de pé
    depends_on:
      - evolution-postgres

  # ----------------------------------------
  # 3. Prometheus (Coletor de Métricas)
  # ----------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  # ----------------------------------------
  # 4. Grafana (Dashboard de Observabilidade)
  # ----------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  evolution_instances:
  evolution_postgres_data: # Novo volume para os dados do Postgres
  prometheus_data:
  grafana_data: